<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inicio de Sesión Seguro</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
    width:350px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.options{
    display:flex;
    justify-content:space-between;
    font-size:14px;
}

.error{
    color:red;
    font-size:14px;
}
</style>

</head>
<body>

<div class="login-container">

    <h2>Iniciar Sesión</h2>

    <form id="loginForm">

        <label for="email">Correo electrónico</label>
        <input
            type="email"
            id="email"
            name="email"
            required
            autocomplete="username">

        <label for="password">Contraseña</label>
        <input
            type="password"
            id="password"
            name="password"
            required
            minlength="8"
            autocomplete="current-password">

        <input type="hidden" name="csrfToken" value="TOKEN_GENERADO_BACKEND">

        <div class="options">
            <label>
                <input type="checkbox" name="remember">
                Recordarme
            </label>

            <a href="/recuperar-password">
                ¿Olvidaste tu contraseña?
            </a>
        </div>

        <br>

        <button type="button" onclick="togglePassword()">
            Mostrar/Ocultar Contraseña
        </button>

        <br><br>

        <button type="submit">
            Ingresar
        </button>

        <p class="error" id="errorMessage"></p>

    </form>

</div>

<script>

function togglePassword(){
    const pass = document.getElementById('password');

    pass.type =
        pass.type === 'password'
        ? 'text'
        : 'password';
}

document.getElementById('loginForm')
.addEventListener('submit', function(e){

    e.preventDefault();

    const email =
        document.getElementById('email').value;

    const password =
        document.getElementById('password').value;

    if(!email || !password){
        document.getElementById('errorMessage')
        .textContent =
        'Todos los campos son obligatorios.';
        return;
    }

    // Simulación de envío seguro al backend
    console.log({
        email,
        password
    });

    alert(
        'Las credenciales serían enviadas al backend mediante HTTPS.'
    );
});

</script>

</body>
</html>
